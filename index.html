<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TreeHouse Recovery NC – Memorial Day Murph 2026</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f0eeea; color: #1a1a1a; }
    .app { max-width: 660px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }
    .header { text-align: center; padding: 1.5rem 0 1.25rem; border-bottom: 1px solid #ddd; margin-bottom: 1.5rem; }
    .header img { height: 80px; margin-bottom: 12px; display: block; margin-left: auto; margin-right: auto; }
    .badge { display: inline-block; font-size: 11px; font-weight: 700; letter-spacing: 0.1em; color: #b03030; border: 1.5px solid #b03030; border-radius: 6px; padding: 3px 10px; margin-bottom: 12px; text-transform: uppercase; }
    .header h1 { font-size: 28px; font-weight: 700; color: #0f2044; line-height: 1.2; }
    .header p { font-size: 14px; color: #666; margin-top: 8px; }
    .info-box { background: #fff; border: 1px solid #ddd; border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 1.5rem; font-size: 14px; color: #555; line-height: 1.65; }
    .donate-box { background: #fff; border: 1.5px solid #0f2044; border-radius: 12px; padding: 1.25rem; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 1.25rem; }
    .donate-text { flex: 1; }
    .donate-text h3 { font-size: 15px; font-weight: 700; color: #0f2044; margin-bottom: 6px; }
    .donate-text p { font-size: 13px; color: #555; line-height: 1.55; margin-bottom: 10px; }
    .donate-link { display: inline-block; background: #0f2044; color: #fff; font-size: 13px; font-weight: 600; padding: 8px 16px; border-radius: 8px; text-decoration: none; }
    .donate-link:hover { background: #162d5e; }
    .qr-wrap { flex-shrink: 0; text-align: center; }
    .qr-wrap p { font-size: 11px; color: #999; margin-top: 6px; }
    #qr-code canvas, #qr-code img { border-radius: 6px; }
    .section-label { font-size: 11px; font-weight: 700; color: #999; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 10px; }
    .slots-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1.5rem; }
    @media (max-width: 480px) { .slots-grid { grid-template-columns: 1fr; } .form-grid { grid-template-columns: 1fr !important; } .donate-box { flex-direction: column; } }
    .slot-card { background: #fff; border: 1.5px solid #ddd; border-radius: 12px; padding: 1rem; cursor: pointer; transition: border-color 0.15s; user-select: none; }
    .slot-card:hover:not(.full) { border-color: #999; }
    .slot-card.selected { border-color: #1a5fa8; border-width: 2px; background: #f4f8ff; }
    .slot-card.full { opacity: 0.45; cursor: not-allowed; }
    .slot-time { font-size: 15px; font-weight: 700; color: #0f2044; }
    .slot-avail { font-size: 13px; margin-top: 5px; }
    .open { color: #2a7a3b; }
    .low  { color: #b06000; }
    .gone { color: #b03030; }
    .bar-track { height: 5px; background: #eee; border-radius: 3px; margin-top: 10px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 3px; background: #1a5fa8; transition: width 0.4s; }
    .bar-fill.bar-low    { background: #e08800; }
    .bar-fill.bar-danger { background: #c03030; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .field { margin-bottom: 1rem; }
    .field label { display: block; font-size: 13px; font-weight: 600; color: #444; margin-bottom: 6px; }
    .field label .req { color: #b03030; }
    input, textarea { width: 100%; padding: 10px 12px; font-size: 14px; font-family: inherit; border: 1px solid #ccc; border-radius: 8px; color: #1a1a1a; background: #fff; outline: none; transition: border-color 0.15s, box-shadow 0.15s; }
    input:focus, textarea:focus { border-color: #1a5fa8; box-shadow: 0 0 0 3px rgba(26,95,168,0.1); }
    textarea { resize: vertical; min-height: 80px; }
    .error-msg { font-size: 13px; color: #b03030; margin-bottom: 1rem; padding: 10px 12px; background: #fdf0f0; border: 1px solid #f5c0c0; border-radius: 8px; }
    .btn { width: 100%; padding: 12px; font-size: 15px; font-weight: 600; color: #fff; background: #0f2044; border: none; border-radius: 10px; cursor: pointer; transition: background 0.15s; font-family: inherit; }
    .btn:hover:not(:disabled) { background: #162d5e; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .success-card { text-align: center; background: #f0faf3; border: 1px solid #a0dbb0; border-radius: 12px; padding: 2.5rem 2rem; }
    .success-icon { font-size: 40px; margin-bottom: 12px; }
    .success-card h2 { font-size: 22px; font-weight: 700; color: #1f6b35; margin-bottom: 8px; }
    .success-card p { font-size: 14px; color: #555; margin-top: 6px; }
    .admin-toggle { text-align: center; margin-top: 2.5rem; padding-top: 1rem; border-top: 1px solid #ddd; }
    .admin-toggle button { font-size: 12px; color: #aaa; background: none; border: none; cursor: pointer; }
    .admin-toggle button:hover { color: #666; }
    .admin-section { margin-top: 1.5rem; }
    .admin-login { display: flex; gap: 8px; margin-bottom: 1rem; }
    .admin-login input { flex: 1; }
    .admin-login .btn { width: auto; padding: 10px 20px; font-size: 13px; }
    .admin-slot { background: #fff; border: 1px solid #ddd; border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 1rem; }
    .admin-slot-header { font-size: 14px; font-weight: 700; color: #0f2044; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
    .admin-slot-count { font-size: 13px; font-weight: 400; color: #888; }
    .admin-row { display: grid; grid-template-columns: 1.2fr 1fr 1.4fr; gap: 8px; font-size: 13px; padding: 6px 0; border-bottom: 1px solid #f5f5f5; color: #444; }
    .admin-row:last-child { border-bottom: none; }
    .admin-row.header { font-weight: 700; color: #888; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; padding-bottom: 8px; }
    .admin-empty { font-size: 13px; color: #bbb; font-style: italic; padding: 4px 0; }
    .export-btn { background: #fff; color: #0f2044; border: 1px solid #0f2044; border-radius: 8px; padding: 8px 16px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; transition: background 0.15s; }
    .export-btn:hover { background: #f0f4fa; }
    .admin-header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
    .refresh-btn { background: none; border: 1px solid #ccc; border-radius: 8px; padding: 6px 12px; font-size: 12px; color: #666; cursor: pointer; font-family: inherit; margin-right: 8px; }
    .loading { text-align: center; padding: 4rem; color: #888; font-size: 14px; }
  </style>
</head>

var DONATE_URL = "https://www.zeffy.com/en-US/donation-form/mackenzie-fund";
var SLOTS = [
  { id: 0, label: "8:00 AM – 9:30 AM" },
  { id: 1, label: "10:00 AM – 11:30 AM" },
  { id: 2, label: "12:00 PM – 1:30 PM" },
  { id: 3, label: "2:00 PM – 3:30 PM" }
];
var MAX = 16;
var ADMIN_PASS = "Murph2026";
var FIREBASE_URL = "https://treehouse-murph-default-rtdb.firebaseio.com";

async function fbGet() {
  try {
    const r = await fetch(FIREBASE_URL + "/registrations.json");
    const data = await r.json();
    if (!data) return { 0: [], 1: [], 2: [], 3: [] };
    const result = { 0: [], 1: [], 2: [], 3: [] };
    [0,1,2,3].forEach(id => {
      if (data[id]) {
        result[id] = Array.isArray(data[id]) ? data[id].filter(Boolean) : Object.values(data[id]).filter(Boolean);
      }
    });
    return result;
  } catch(e) { return null; }
}

async function fbSet(data) {
  try {
    await fetch(FIREBASE_URL + "/registrations.json", {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data)
    });
    return true;
  } catch(e) { return false; }
}

const { useState, useEffect, useRef, useCallback } = React;

function DonateBox() {
  const qrRef = useRef(null);
  useEffect(() => {
    if (qrRef.current && qrRef.current.children.length === 0) {
      new QRCode(qrRef.current, {
        text: DONATE_URL,
        width: 100,
        height: 100,
        colorDark: "#0f2044",
        colorLight: "#ffffff",
        correctLevel: QRCode.CorrectLevel.M
      });
    }
  }, []);
  return React.createElement("div", { className: "donate-box" },
    React.createElement("div", { className: "donate-text" },
      React.createElement("h3", null, "❤️ Support the Mackenzie Fund"),
      React.createElement("p", null, "While you're here, consider making a donation to the Mackenzie Fund. Every contribution helps support those in recovery."),
      React.createElement("a", { className: "donate-link", href: DONATE_URL, target: "_blank", rel: "noopener noreferrer" }, "Donate Now")
    ),
    React.createElement("div", { className: "qr-wrap" },
      React.createElement("div", { id: "qr-code", ref: qrRef }),
      React.createElement("p", null, "Scan to donate")
    )
  );
}

function App() {
  const [regs, setRegs] = useState({ 0: [], 1: [], 2: [], 3: [] });
  const [loading, setLoading] = useState(true);
  const [submitted, setSubmitted] = useState(false);
  const [submitting, setSubmitting] = useState(false);
  const [error, setError] = useState("");
  const [form, setForm] = useState({ first: "", last: "", phone: "", email: "", slot: null, comments: "" });
  const [showAdmin, setShowAdmin] = useState(false);
  const [adminPass, setAdminPass] = useState("");
  const [adminAuthed, setAdminAuthed] = useState(false);
  const [adminErr, setAdminErr] = useState("");
  const [submittedName, setSubmittedName] = useState("");
  const [submittedSlot, setSubmittedSlot] = useState("");
  const [fbError, setFbError] = useState(false);

  const loadData = useCallback(async () => {
    setLoading(true);
    const data = await fbGet();
    if (data === null) { setFbError(true); }
    else { setRegs(data); setFbError(false); }
    setLoading(false);
  }, []);

  useEffect(() => { loadData(); }, [loadData]);

  const slotCount = id => (regs[id] || []).length;
  const slotFull = id => slotCount(id) >= MAX;
  const slotAvail = id => MAX - slotCount(id);
  const setField = (k, v) => setForm(f => ({ ...f, [k]: v }));

  const handleSubmit = async () => {
    if (!form.first.trim() || !form.last.trim() || !form.phone.trim() || !form.email.trim() || form.slot === null) {
      setError("Please fill out all required fields and select a time slot.");
      return;
    }
    setSubmitting(true); setError("");
    const current = await fbGet();
    if (!current) { setError("Connection error — please try again."); setSubmitting(false); return; }
    if ((current[form.slot] || []).length >= MAX) {
      setError("That slot just filled up — please select another.");
      setRegs(current); setSubmitting(false); return;
    }
    const newReg = { first: form.first.trim(), last: form.last.trim(), phone: form.phone.trim(), email: form.email.trim(), comments: form.comments.trim(), ts: new Date().toISOString() };
    const updated = { ...current, [form.slot]: [...(current[form.slot] || []), newReg] };
    const ok = await fbSet(updated);
    if (!ok) { setError("Save failed — please try again."); setSubmitting(false); return; }
    setRegs(updated);
    setSubmittedName(form.first + " " + form.last);
    setSubmittedSlot(SLOTS[form.slot].label);
    setSubmitted(true); setSubmitting(false);
  };

  const adminLogin = () => {
    if (adminPass === ADMIN_PASS) { setAdminAuthed(true); setAdminErr(""); loadData(); }
    else setAdminErr("Incorrect password.");
  };

  const exportCSV = () => {
    let rows = ["Time Slot,First Name,Last Name,Phone,Email,Comments,Registered At"];
    SLOTS.forEach(s => {
      (regs[s.id] || []).forEach(r => {
        rows.push(['"'+s.label+'"', r.first, r.last, r.phone, r.email, '"'+( r.comments||"").replace(/"/g,'""')+'"', r.ts].join(","));
      });
    });
    const blob = new Blob([rows.join("\n")], { type: "text/csv" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href = url; a.download = "murph2026_registrations.csv"; a.click();
  };

  const barClass = id => {
    const pct = slotCount(id) / MAX;
    if (pct >= 1) return "bar-danger";
    if (pct >= 0.75) return "bar-low";
    return "";
  };
  const availClass = id => {
    const pct = slotCount(id) / MAX;
    if (pct >= 1) return "gone";
    if (pct >= 0.75) return "low";
    return "open";
  };

  const e = React.createElement;

  if (loading) return e("div", { className: "loading" }, "Loading registration...");

  return e("div", { className: "app" },
    e("div", { className: "header" },
      e("img", { src: LOGO_SRC, alt: "TreeHouse Recovery NC" }),
      e("div", { className: "badge" }, "Memorial Day 2026"),
      e("h1", null, "TreeHouse Recovery NC", e("br", null), "Memorial Day Murph"),
      e("p", null, "May 25th, 2026 · 1118 N. Fourth St., Wilmington, NC 28401")
    ),

    fbError && e("div", { className: "error-msg" }, "⚠ Database not configured. Update the FIREBASE_URL in the code."),

    e("div", { className: "info-box" },
      "Tree House Recovery North Carolina is hosting a Memorial Day Murph. Registration is free. Please select a time slot that is available and come and have fun. The event will be held at Tree House Recovery 1118 N. Fourth St. Wilmington, NC 28401 on May 25th, 2026. Space is limited first come first serve."
    ),

    e(DonateBox),

    submitted
      ? e("div", { className: "success-card" },
          e("div", { className: "success-icon" }, "✓"),
          e("h2", null, "You're registered!"),
          e("p", null, submittedName + " is confirmed for the " + submittedSlot + " slot."),
          e("p", { style: { marginTop: "8px" } }, "See you on Memorial Day!")
        )
      : e("div", null,
          e("div", { className: "section-label" }, "Pick a time slot"),
          e("div", { className: "slots-grid" },
            SLOTS.map(s => {
              const full = slotFull(s.id);
              const selected = form.slot === s.id;
              const pct = slotCount(s.id) / MAX;
              return e("div", {
                key: s.id,
                className: "slot-card" + (selected ? " selected" : "") + (full ? " full" : ""),
                onClick: () => !full && setField("slot", s.id)
              },
                e("div", { className: "slot-time" }, s.label),
                e("div", { className: "slot-avail " + availClass(s.id) },
                  full ? "Full — no spots remaining" : slotAvail(s.id) + " of " + MAX + " spots left"
                ),
                e("div", { className: "bar-track" },
                  e("div", { className: "bar-fill " + barClass(s.id), style: { width: Math.round(pct * 100) + "%" } })
                )
              );
            })
          ),
          e("div", { className: "section-label" }, "Your information"),
          e("div", { className: "form-grid" },
            e("div", { className: "field" },
              e("label", null, "First name ", e("span", { className: "req" }, "*")),
              e("input", { type: "text", value: form.first, onChange: ev => setField("first", ev.target.value), placeholder: "First" })
            ),
            e("div", { className: "field" },
              e("label", null, "Last name ", e("span", { className: "req" }, "*")),
              e("input", { type: "text", value: form.last, onChange: ev => setField("last", ev.target.value), placeholder: "Last" })
            )
          ),
          e("div", { className: "field" },
            e("label", null, "Phone number ", e("span", { className: "req" }, "*")),
            e("input", { type: "tel", value: form.phone, onChange: ev => setField("phone", ev.target.value), placeholder: "(910) 000-0000" })
          ),
          e("div", { className: "field" },
            e("label", null, "Email address ", e("span", { className: "req" }, "*")),
            e("input", { type: "email", value: form.email, onChange: ev => setField("email", ev.target.value), placeholder: "example@example.com" })
          ),
          e("div", { className: "field" },
            e("label", null, "Additional comments or special requests"),
            e("textarea", { value: form.comments, onChange: ev => setField("comments", ev.target.value), placeholder: "Anything we should know..." })
          ),
          error && e("div", { className: "error-msg" }, error),
          e("button", { className: "btn", onClick: handleSubmit, disabled: submitting || fbError },
            submitting ? "Registering..." : "Register for the Murph →"
          )
        ),

    e("div", { className: "admin-toggle" },
      e("button", { onClick: () => setShowAdmin(!showAdmin) }, showAdmin ? "Hide admin" : "Admin access")
    ),

    showAdmin && e("div", { className: "admin-section" },
      !adminAuthed
        ? e("div", null,
            e("div", { className: "admin-login" },
              e("input", { type: "password", value: adminPass, onChange: ev => setAdminPass(ev.target.value), placeholder: "Admin password", onKeyDown: ev => ev.key === "Enter" && adminLogin() }),
              e("button", { className: "btn", onClick: adminLogin }, "Unlock")
            ),
            adminErr && e("div", { className: "error-msg" }, adminErr)
          )
        : e("div", null,
            e("div", { className: "admin-header-row" },
              e("div", { className: "section-label", style: { margin: 0 } }, "All registrations"),
              e("div", null,
                e("button", { className: "refresh-btn", onClick: loadData }, "Refresh"),
                e("button", { className: "export-btn", onClick: exportCSV }, "Export CSV")
              )
            ),
            SLOTS.map(s =>
              e("div", { key: s.id, className: "admin-slot" },
                e("div", { className: "admin-slot-header" },
                  s.label,
                  e("span", { className: "admin-slot-count" }, slotCount(s.id) + " / " + MAX + " registered")
                ),
                (regs[s.id] || []).length === 0
                  ? e("div", { className: "admin-empty" }, "No registrations yet")
                  : e("div", null,
                      e("div", { className: "admin-row header" },
                        e("span", null, "Name"), e("span", null, "Phone"), e("span", null, "Email")
                      ),
                      (regs[s.id] || []).map((r, i) =>
                        e("div", { key: i, className: "admin-row" },
                          e("span", null, r.first + " " + r.last),
                          e("span", null, r.phone),
                          e("span", null, r.email)
                        )
                      )
                    )
              )
            )
          )
    )
  );
}

window.addEventListener("load", function() {
  ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
});
</script>
</body>
</html>
